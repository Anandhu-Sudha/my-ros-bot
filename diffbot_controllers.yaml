controller_manager:
  ros__parameters:
    update_rate: 20  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    diffbot_base_controller:
      type: diff_drive_controller/DiffDriveController

    # State feedback topic — odom from the diff drive controller
    state_topic: /diffbot_base_controller/odom

    # Output is republished here; diff drive controller reads it
    command_topic: /diffbot_base_controller/cmd_vel

# ── Diff drive controller (unchanged except cmd_vel topic) ─────
diffbot_base_controller:
  ros__parameters:
    left_wheel_names:  ["front_left_wheel_joint",  "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    wheel_separation: 0.164
    wheel_radius: 0.04
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 20.0
    odom_frame_id: odom
    base_frame_id: base_link

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false
    enable_odom_tf: false #if no imu , true then
    cmd_vel_timeout: 0.5

    linear.x.has_velocity_limits: true 
    linear.x.has_acceleration_limits: false # change to true for smooth outputs
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 2.0
    linear.x.min_velocity: -2.0
    linear.x.max_acceleration: 2.0
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: false # change to true for smooth outputs
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 4.0
    angular.z.min_velocity: -4.0
    angular.z.max_acceleration: 4.0
    angular.z.min_acceleration: -4.0
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0
