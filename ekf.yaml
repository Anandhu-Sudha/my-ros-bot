# calixto-ros-bot/config/ekf.yaml
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map              # Defaults to 'map'
    odom_frame: odom            # Defaults to 'odom'
    base_link_frame: base_link  # Defaults to 'base_link'
    world_frame: odom           # Set to 'odom' for local localization
    odom_pub_topic: odom

    # Wheel Odometry (from diffbot_base_controller)
    odom0: /diffbot_base_controller/odom                
    odom0_config: [false, false, false, # x, y, z
               	   false, false, false, # roll, pitch, yaw
                   true,  false, false, # vx (Linear velocity)
                   false, false, true,  # v_yaw (Angular velocity)
                   false, false, false]
    # IMU Data
    imu0: /bno055/imu
    imu0_config: [false, false, false,
                  false, false, true,  # Fuse absolute orientation
                  false, false, false,
                  false, false, true,  # Fuse angular velocities
                  true,  false, false]
    imu0_relative: true
    use_dynamic_process_noise_covariance: false
